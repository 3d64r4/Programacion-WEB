<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Registro de usuarios</title>
  <style>
    /* Estilos simplificados */
    body { font-family: Arial, sans-serif; background:#f7f7fb; margin:0; }
    .container {
      max-width:720px; margin:40px auto; padding:24px;
      background:#fff; border:1px solid #ddd; border-radius:12px;
      box-shadow:0 8px 24px rgba(0,0,0,.06);
    }
    form { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
    .full { grid-column:1 / -1; }
    label { font-weight:600; margin-bottom:6px; display:block; }
    input, select {
      width:100%; padding:10px; border:1px solid #ccc; border-radius:8px;
    }
    .actions { grid-column:1 / -1; display:flex; gap:12px; margin-top:8px; }
    button { padding:12px 16px; border:none; border-radius:8px; font-weight:600; cursor:pointer; }
    .primary { background:#2563eb; color:#fff; }
    .secondary { background:#e5e7eb; }
    .error { color:#b91c1c; font-size:.85rem; display:none; }
  </style>
</head>
<body>
  <main class="container">
    <h1>Registro de usuarios</h1>
    <form id="registro" novalidate>
      <div><label>Nombre *</label><input id="nombre" required></div>
      <div><label>Apellido paterno *</label><input id="apellidopaterno" required></div>
      <div><label>Apellido materno</label><input id="apellidomaterno"></div>
      <div><label>Fecha nacimiento *</label><input type="date" id="fechanacimiento" required></div>
      <div><label>Sexo *</label>
        <select id="sexo" required>
          <option value="" disabled selected>Selecciona</option>
          <option>Masculino</option><option>Femenino</option><option>Otro</option>
        </select>
      </div>
      <div class="full"><label>Email *</label><input type="email" id="correo" required></div>
      <div><label>Teléfono</label><input id="telefono"></div>
      <div><label>País *</label><input id="pais" required></div>
      <div><label>Ciudad *</label><input id="ciudad" required></div>
      <div><label>Rol *</label>
        <select id="rol" required>
          <option value="" disabled selected>Selecciona</option>
          <option value="user">Usuario</option>
          <option value="admin">Administrador</option>
          <option value="guest">Invitado</option>
        </select>
      </div>
      <div><label>Estado *</label>
        <select id="estado" required>
          <option value="" disabled selected>Selecciona</option>
          <option value="activo">Activo</option>
          <option value="inactivo">Inactivo</option>
          <option value="bloqueado">Bloqueado</option>
        </select>
      </div>
      <div><label>Contraseña *</label><input type="password" id="contrasena" minlength="8" required></div>
      <div><label>Confirmar contraseña *</label><input type="password" id="confirmacion" required>
        <p id="error-pass" class="error">Las contraseñas no coinciden</p>
      </div>
      <div class="actions">
        <button type="submit" class="primary">Crear cuenta</button>
        <button type="reset" class="secondary">Limpiar</button>
      </div>
    </form>
    <p id="server-error" class="error full"></p>
  </main>

  <script>
    const form = document.getElementById('registro');
    const errorPass = document.getElementById('error-pass');
    const serverError = document.getElementById('server-error');
    const contrasena = document.getElementById('contrasena');
    const confirmacion = document.getElementById('confirmacion');

    function checkPasswords() {
      const ok = contrasena.value === confirmacion.value;
      errorPass.style.display = ok ? 'none' : 'block';
      return ok;
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      serverError.style.display = 'none';

      if (!form.checkValidity() || !checkPasswords()) {
        form.reportValidity();
        return;
      }

      const datos = {
        Nombre: document.getElementById('nombre').value,
        Apaterno: document.getElementById('apellidopaterno').value,
        Amaterno: document.getElementById('apellidomaterno').value,
        Fechanac: document.getElementById('fechanacimiento').value,
        Sexo: document.getElementById('sexo').value,
        Email: document.getElementById('correo').value,
        Telefono: document.getElementById('telefono').value,
        Pais: document.getElementById('pais').value,
        Ciudad: document.getElementById('ciudad').value,
        Rol: document.getElementById('rol').value,
        Estado: document.getElementById('estado').value,
        Contrasena: contrasena.value
      };

      try {
        const res = await fetch('http://localhost:4000/registro', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(datos)
        });

        const json = await res.json();

        if (!res.ok) {
          serverError.textContent = json.mensaje || 'Error al registrar';
          serverError.style.display = 'block';
          return;
        }

        alert('¡Éxito! ' + json.mensaje);
        form.reset();

      } catch (err) {
        console.error('Error de fetch:', err);
        serverError.textContent = 'No se pudo conectar con el servidor.';
        serverError.style.display = 'block';
      }
    });
  </script>
</body>
</html>
