<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reporte de Ndexos - Control Profesional</title>
  <style>
    :root {
      --office-blue: #2b579a;
      --office-blue-dark: #1e3a63;
      --light-gray: #f3f2f1;
      --border-color: #edebe9;
      --text-main: #323130;
      --accent-blue: #0078d4;
    }

    body {
      font-family: 'Segoe UI', Tahoma, sans-serif;
      background-color: #faf9f8;
      margin: 0;
      padding: 20px;
      color: var(--text-main);
    }

    /* Marco del Reporte */
    .report-wrapper {
      max-width: 1200px;
      margin: 0 auto;
      background: white;
      border: 1px solid var(--border-color);
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
      border-radius: 4px;
    }

    .header-main {
      background: var(--office-blue);
      color: white;
      padding: 15px 25px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .info-bar {
      padding: 10px 25px;
      background: var(--light-gray);
      border-bottom: 1px solid var(--border-color);
      font-size: 0.85rem;
    }

    /* Tabla Estilo Excel */
    .scroll-container {
      padding: 20px;
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 900px;
    }

    th {
      background: #f8f8f8;
      padding: 12px;
      text-align: left;
      border-bottom: 2px solid var(--border-color);
      font-size: 0.85rem;
      text-transform: uppercase;
      color: #666;
    }

    td {
      padding: 12px;
      border-bottom: 1px solid var(--border-color);
      font-size: 0.9rem;
    }

    tr:hover {
      background-color: #f3f2f1;
    }

    /* Botones de Acción */
    .action-group {
      display: flex;
      gap: 8px;
    }

    .btn {
      padding: 6px 12px;
      border-radius: 2px;
      border: 1px solid #ccc;
      cursor: pointer;
      font-size: 0.8rem;
      background: white;
      transition: all 0.2s;
    }

    .btn-gota {
      background: var(--accent-blue);
      color: white;
      border: none;
      font-weight: 600;
    }

    .btn-gota:hover {
      background: var(--office-blue-dark);
    }

    .btn-edit:hover {
      background: #eee;
    }

    .btn-delete:hover {
      color: #a4262c;
      border-color: #a4262c;
    }

    /* Estilos del Modal */
    .modal {
      display: none;
      position: fixed;
      z-index: 1000;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);
    }

    .modal-content {
      background: white;
      margin: 2% auto;
      padding: 25px;
      width: 550px;
      border-radius: 4px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
    }

    .modal-header {
      border-bottom: 1px solid #eee;
      padding-bottom: 10px;
      margin-bottom: 20px;
    }

    /* Formulario en Grid */
    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .full {
      grid-column: span 2;
    }

    label {
      font-size: 0.75rem;
      font-weight: 700;
      color: #555;
      display: block;
      margin-bottom: 4px;
    }

    input,
    textarea,
    select {
      width: 100%;
      padding: 8px;
      border: 1px solid #ced4da;
      border-radius: 2px;
      box-sizing: border-box;
      font-family: inherit;
    }

    input[readonly] {
      background-color: #f3f2f1;
      color: #666;
      cursor: not-allowed;
    }

    .modal-footer {
      margin-top: 25px;
      text-align: right;
      border-top: 1px solid #eee;
      padding-top: 15px;
    }

    .btn-save {
      background: var(--office-blue);
      color: white;
      border: none;
      padding: 10px 20px;
      font-weight: 600;
    }
  </style>
</head>

<body>

  <div class="report-wrapper">
    <div class="header-main">
      <h1 style="margin:0; font-size: 1.3rem;">Reporte de Ndexos</h1>
      <a href="Index.html" class="btn-back">⬅ Panel Principal</a>
    </div>
    

    <div class="info-bar" id="usuarioBar">
      Cargando datos del usuario...
    </div>

    <div class="scroll-container">
      <table id="tablaNdexos">
        <thead>
          <tr>
            <th>ID</th>
            <th>Alias</th>
            <th>Lugar</th>
            <th>Actitud</th>
            <th>Relación</th>
            <th>Fecha Inicio</th>
            <th>Estrés</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody>
          <!-- Se rellena por JavaScript -->
        </tbody>
      </table>
    </div>
  </div>

  <!-- Modal de Registro de N De-XOO (Estilo Corporativo) -->
<div id="modalNdexo" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h2 style="margin:0; color: var(--office-blue);">👤 Registro: Nuevo N De-XOO</h2>
            <span id="cerrarModal" style="cursor:pointer; font-size: 24px; color: #999;">&times;</span>
        </div>

        <form id="formNdexo">
            <div class="form-grid">
                <!-- Identificación del Registro -->
                <div class="full">
                    <label>Alias del individuo *</label>
                    <input type="text" id="Alias" name="Alias" required 
                           placeholder="Escribe el nombre o apodo para identificarlo">
                </div>

                <!-- Detalles del Contexto -->
                <div>
                    <label>Lugar del encuentro:</label>
                    <input type="text" id="lugar_interaccion" name="lugar_interaccion" 
                           placeholder="Ej. Oficina, Universidad...">
                </div>
                <div>
                    <label>Relación / Vínculo:</label>
                    <input type="text" id="relacion" name="relacion" 
                           placeholder="Ej. Compañero, Familiar...">
                </div>

                <!-- Estado Inicial -->
                <div>
                    <label>Actitud detectada:</label>
                    <input type="text" id="actitud" name="actitud" 
                           placeholder="Ej. Hostil, Pasiva...">
                </div>
                <div>
                    <label>Fecha de inicio de registro:</label>
                    <input type="date" id="fecha_inicio" name="fecha_inicio">
                </div>

                <!-- Indicador de Impacto Emocional -->
                <div class="full">
                    <label style="display: flex; justify-content: space-between;">
                        Nivel de estrés generado (0-10):
                        <span id="valorEstrés" style="font-weight: bold; color: var(--office-blue);">5</span>
                    </label>
                    <input type="range" id="nivel_estress" name="nivel_estress" min="0" max="10" step="1" 
                           style="width: 100%; margin-top: 10px;"
                           oninput="document.getElementById('valorEstrés').innerText = this.value">
                </div>
            </div>

            <div class="modal-footer">
                <button type="button" class="btn" id="cancelarBtnNdexo">Cancelar</button>
                <button type="submit" class="btn btn-save">💾 Guardar Perfil</button>
            </div>
        </form>
    </div>
</div>

<!-- Modal para REGISTRAR GOTA (Vaso de Agua) -->
<div id="modalVaso" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h2 style="margin:0; color: var(--office-blue);">💧 Registro: Una Gota Más</h2>
            <span onclick="cerrarModal()" style="cursor:pointer; font-size: 24px; color: #999;">&times;</span>
        </div>

        <form id="formVaso">
            <div class="form-grid">
                <!-- Datos Automáticos -->
                <div>
                    <label>ID Ndexo Seleccionado:</label>
                    <input type="text" id="aliasdelndexo" readonly>
                </div>
                <div>
                    <label>Nombre/Alias:</label>
                    <input type="text" id="modalAlias" readonly>
                </div>

                <!-- Datos de entrada -->
                <div>
                    <label>Fecha *</label>
                    <input type="date" id="fecha" required>
                </div>
                <div>
                    <label>Hora *</label>
                    <input type="time" id="hora" required>
                </div>

                <div class="full">
                    <label>Lugar del incidente:</label>
                    <input type="text" id="lugar" placeholder="Ej. Comedor, Reunión de Zoom...">
                </div>

                <div class="full">
                    <label>Problema causado:</label>
                    <textarea id="problema_causado" rows="2"></textarea>
                </div>

                <div class="full">
                    <label>Medio del problema (¿Cómo sucedió?):</label>
                    <input type="text" id="medio_problema">
                </div>

                <div class="full">
                    <label>Resultados / Consecuencias:</label>
                    <textarea id="resultados" rows="2"></textarea>
                </div>

                <div class="full">
                    <label>¿Cómo me sentí? (Impacto emocional):</label>
                    <input type="text" id="como_me_senti">
                </div>
            </div>

            <div class="modal-footer">
                <button type="button" class="btn" onclick="cerrarModal()">Descartar</button>
                <button type="submit" class="btn btn-save">💧 Registrar Gota</button>
            </div>
        </form>
    </div>
</div>


  <script>
    // Referencia global al modal
    const modal = document.getElementById('modalVaso');

    /* ======================================================
       💧 ABRIR MODAL Y PRECARGAR DATOS
       ====================================================== */
    window.abrirGota = (id, alias) => {
        const form = document.getElementById('formVaso');
        if (form) form.reset();

        // 1. Asignamos el ID del Ndexo al input oculto o visible 'aliasdelndexo'
        const inputId = document.getElementById('aliasdelndexo');
        if (inputId) inputId.value = id;

        // 2. Si tienes un campo solo para mostrar el nombre (opcional)
        const displayAlias = document.getElementById('modalAlias');
        if (displayAlias) displayAlias.value = alias;

        // 3. Poner fecha y hora actual por defecto
        const ahora = new Date();
        document.getElementById('fecha').value = ahora.toISOString().split('T')[0];
        document.getElementById('hora').value = ahora.toTimeString().slice(0, 5);

        modal.style.display = 'block';
    };

    window.cerrarModal = () => { 
        modal.style.display = 'none'; 
    };

    /* ======================================================
       📊 CARGAR TABLA DE NDEXOS AL INICIAR
       ====================================================== */
    document.addEventListener('DOMContentLoaded', async () => {
        const usuario = JSON.parse(localStorage.getItem('usuario'));
        if (!usuario) {
            alert('Debes iniciar sesión');
            window.location.href = 'login.html'; // Redirigir si no hay sesión
            return;
        }

        // Mostrar info del usuario en la barra
        const usuarioBar = document.getElementById('usuarioBar');
        if (usuarioBar) {
            usuarioBar.textContent = `Usuario: ${usuario.Nombre || 'Usuario'} | ID: ${usuario.id}`;
        }

        try {
            const res = await fetch(`http://localhost:4000/ndexo?usuario_id=${usuario.id}`);
            const ndexos = await res.json();
            const tbody = document.querySelector('#tablaNdexos tbody');

            if (!tbody) return;
            tbody.innerHTML = ''; // Limpiar tabla antes de llenar

            ndexos.forEach(n => {
                const fila = `
                <tr>
                    <td>${n.id}</td>
                    <td><strong>${n.Alias}</strong></td>
                    <td>${n.lugar_interaccion || ''}</td>
                    <td>${n.actitud || ''}</td>
                    <td>${n.relacion || ''}</td>
                    <td>${n.fecha_inicio || ''}</td>
                    <td>${n.nivel_estress || '0'}</td>
                    <td>
                        <div class="action-group">
                            <button class="btn btn-gota" onclick="abrirGota(${n.id}, '${n.Alias}')">💧 Una gota más</button>
                            <button class="btn btn-edit" onclick="editarRegistro(${n.id})">Editar</button>
                            <button class="btn btn-delete" onclick="eliminarRegistro(${n.id})">Borrar</button>
                        </div>
                    </td>
                </tr>`;
                tbody.insertAdjacentHTML('beforeend', fila);
            });
        } catch (err) {
            console.error('Error cargando tabla:', err);
        }
    });

    /* ======================================================
       🚀 ENVIAR REGISTRO DE GOTA (POST)
       ====================================================== */
    document.getElementById('formVaso').addEventListener('submit', async (e) => {
        e.preventDefault();

        const usuarioLogueado = JSON.parse(localStorage.getItem('usuario'));
        const userId = usuarioLogueado?.id;

        if (!userId) {
            alert('⚠️ Error: Sesión no válida.');
            return;
        }

        // Recolectar datos asegurando que los nombres coincidan con el BACKEND
        const datos = {
            fecha: document.getElementById('fecha').value,
            hora: document.getElementById('hora').value,
            lugar: document.getElementById('lugar').value,
            aliasdelndexo: document.getElementById('aliasdelndexo').value, // ID del Ndexo
            usuario_id: userId, 
            problema_causado: document.getElementById('problema_causado').value,
            medio_problema: document.getElementById('medio_problema').value,
            resultados: document.getElementById('resultados').value,
            como_me_senti: document.getElementById('como_me_senti').value
        };

        try {
            const response = await fetch('http://localhost:4000/vasodeagua', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(datos)
            });

            const resultado = await response.json();

            if (response.ok) {
                alert('💧 Gota registrada correctamente');
                cerrarModal();
            } else {
                alert('❌ Error: ' + resultado.mensaje);
            }
        } catch (error) {
            console.error('Error en fetch:', error);
            alert('❌ Error de conexión con el servidor.');
        }
    });

    // Cerrar al hacer clic fuera
    window.onclick = (e) => { if (e.target == modal) cerrarModal(); };




    window.eliminarRegistro = async (id) => {
    // 1. Confirmación de seguridad
    if (!confirm('¿Estás seguro de que deseas eliminar este registro? (Se marcará como eliminado)')) {
        return;
    }

    try {
        // 2. Llamada al backend usando el método PATCH o PUT
        // Usamos PATCH porque solo vamos a modificar un campo (status)
        const response = await fetch(`http://localhost:4000/ndexo/${id}`, {
            method: 'PATCH',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ status: 'eliminado' })
        });

        if (response.ok) {
            alert('Registro marcado como eliminado correctamente.');
            // 3. Recargar la página para que desaparezca de la lista
            location.reload(); 
        } else {
            const error = await response.json();
            alert('❌ Error al eliminar: ' + (error.mensaje || 'Error desconocido'));
        }
    } catch (err) {
        console.error('Error en la petición:', err);
        alert('❌ Error de conexión con el servidor.');
    }
};

    // Funciones temporales para evitar errores


    window.editarRegistro = (id) => alert('Función editar próximamente para ID: ' + id);
    
</script>

</body>

</html>
