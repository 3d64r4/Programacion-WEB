<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reporte Maestro - Vaso de Agua</title>
  <style>
    :root {
      --office-blue: #2b579a;
      --office-blue-dark: #1e3a63;
      --light-gray: #f3f2f1;
      --border-color: #edebe9;
      --text-main: #323130;
      --accent-blue: #0078d4;
      --soft-blue: #deecf9;
    }

    body {
      font-family: 'Segoe UI', Tahoma, sans-serif;
      background-color: #faf9f8;
      margin: 0;
      padding: 20px;
      color: var(--text-main);
    }

    .report-wrapper {
      max-width: 1200px;
      margin: 0 auto;
      background: white;
      border: 1px solid var(--border-color);
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
      border-radius: 4px;
      overflow: hidden;
    }

    /* Encabezado */
    .header-main {
      background: var(--office-blue);
      color: white;
      padding: 15px 25px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .btn-back {
      color: white;
      text-decoration: none;
      border: 1px solid rgba(255,255,255,0.5);
      padding: 6px 15px;
      font-size: 0.85rem;
      border-radius: 2px;
    }

    .btn-back:hover { background: rgba(255,255,255,0.1); }

    /* Estilos de Tabla */
    .section-container { padding: 25px; }
    
    .table-responsive {
      overflow-x: auto;
      margin-bottom: 40px;
      border: 1px solid var(--border-color);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 800px;
    }

    th {
      background: #f8f8f8;
      padding: 12px;
      text-align: left;
      font-size: 0.75rem;
      text-transform: uppercase;
      color: #666;
      border-bottom: 2px solid var(--border-color);
    }

    td {
      padding: 10px 12px;
      border-bottom: 1px solid var(--border-color);
      font-size: 0.85rem;
    }

    /* Estilos de Línea de Tiempo (Vertical) */
    .timeline {
      position: relative;
      max-width: 800px;
      margin: 0 auto;
      padding-left: 30px;
    }

    .timeline::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 3px;
      background: var(--office-blue);
    }

    .timeline-item {
      position: relative;
      margin-bottom: 30px;
    }

    .timeline-item::before {
      content: '';
      position: absolute;
      left: -37px;
      top: 5px;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: white;
      border: 3px solid var(--office-blue);
    }

    .timeline-card {
      background: #fff;
      border: 1px solid var(--border-color);
      padding: 15px;
      border-radius: 4px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.03);
    }

    .timeline-date {
      color: var(--office-blue);
      font-weight: bold;
      font-size: 0.8rem;
    }

    .timeline-badge {
      display: inline-block;
      background: var(--soft-blue);
      color: var(--office-blue-dark);
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 0.7rem;
      font-weight: bold;
      margin-left: 10px;
    }

    .title-divider {
      border-left: 5px solid var(--office-blue);
      padding-left: 15px;
      margin-bottom: 20px;
      font-size: 1.1rem;
    }
  </style>
</head>
<body>

<div class="report-wrapper">
    <div class="header-main">
        <h1 style="margin:0; font-size: 1.2rem;">📊 Reporte General de Incidencias</h1>
        <a href="Index.html" class="btn-back">⬅ Panel Principal</a>
    </div>

    <div class="section-container">
        <!-- SECCIÓN 1: TABLA RESUMEN -->
        <h2 class="title-divider">Resumen de Datos</h2>
        <div class="table-responsive">
            <table id="tablaVaso">
                <thead>
                    <tr>
                        <th>Fecha</th>
                        <th>Ndexo (Alias)</th>
                        <th>Lugar</th>
                        <th>Problema Breve</th>
                        <th>Cómo me sentí</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Se llena con JS -->
                </tbody>
            </table>
        </div>

        <!-- SECCIÓN 2: LÍNEA DE TIEMPO -->
        <h2 class="title-divider">Crónica de Eventos (Línea de Tiempo)</h2>
        <div id="timelineContainer" class="timeline">
            <!-- Se llena con JS -->
        </div>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', async () => {
        const usuario = JSON.parse(localStorage.getItem('usuario'));
        if (!usuario) { window.location.href = 'login.html'; return; }

        try {
            // Reutilizamos el endpoint que hace el JOIN con la tabla ndexo
            const res = await fetch(`http://localhost:4000/historial-vaso?usuario_id=${usuario.id || usuario.ID}`);
            const datos = await res.json();
            
            const tbody = document.querySelector('#tablaVaso tbody');
            const timeline = document.getElementById('timelineContainer');

            if (datos.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" style="text-align:center">Sin registros.</td></tr>';
                timeline.innerHTML = '<p>No hay eventos para mostrar.</p>';
                return;
            }

            datos.forEach(item => {
                const f = new Date(item.fecha).toLocaleDateString();

                // 1. Llenar Tabla
                const fila = `
                    <tr>
                        <td>${f} <span style="color:#888">(${item.hora.slice(0,5)})</span></td>
                        <td><strong>${item.Alias}</strong></td>
                        <td>${item.lugar || '-'}</td>
                        <td>${item.problema_causado.substring(0, 40)}...</td>
                        <td><em>${item.como_me_senti || '-'}</em></td>
                    </tr>
                `;
                tbody.insertAdjacentHTML('beforeend', fila);

                // 2. Llenar Línea de Tiempo
                const evento = `
                    <div class="timeline-item">
                        <div class="timeline-card">
                            <span class="timeline-date">${f} - ${item.hora.slice(0,5)} hs</span>
                            <span class="timeline-badge">${item.Alias}</span>
                            <p style="margin: 10px 0 5px 0;"><strong>Suceso:</strong> ${item.problema_causado}</p>
                            <p style="margin: 0; font-size: 0.8rem; color: #666;"><strong>Impacto:</strong> ${item.resultados || 'N/A'}</p>
                        </div>
                    </div>
                `;
                timeline.insertAdjacentHTML('beforeend', evento);
            });

        } catch (err) {
            console.error('Error:', err);
        }
    });
</script>

</body>
</html>
